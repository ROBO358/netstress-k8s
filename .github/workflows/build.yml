name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: sha
        run: echo "tag=sha-$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub (pull DHI base images)
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          tags: |
            ghcr.io/robo358/netstress-k8s:${{ steps.sha.outputs.tag }}
            ghcr.io/robo358/netstress-k8s:main
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in manifests
        run: |
          cd manifests
          kustomize edit set image ghcr.io/robo358/netstress-k8s:${{ needs.build-and-push.outputs.image_tag }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add manifests/kustomization.yaml
          git commit -m "chore(image): bump to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push
