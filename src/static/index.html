<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>netstress</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>netstress</h1>
    <p class="subtitle">Network stress tester for yh-cluster</p>
  </header>

  <main>
    <section class="config">
      <div class="config-left">
        <div class="config-field">
          <label for="size">Size</label>
          <select id="size">
            <option value="25">25 MB</option>
            <option value="50">50 MB</option>
            <option value="100" selected>100 MB</option>
            <option value="250">250 MB</option>
            <option value="1000">1 GB</option>
            <option value="0">無制限</option>
          </select>
        </div>
        <label class="toggle-label">
          <input type="checkbox" id="simultaneous" />
          <span class="toggle-track"></span>
          <span>DL + UL 同時実行</span>
        </label>
      </div>
      <div class="config-right">
        <button id="btn-all" class="btn btn-primary">Run All</button>
        <button id="btn-stop" class="btn btn-danger" hidden>Stop</button>
      </div>
    </section>

    <section class="cards">
      <div class="card card-ping" id="card-ping">
        <div class="card-top">
          <div class="card-label">Latency</div>
          <button class="btn" id="btn-ping">Ping</button>
        </div>
        <div class="card-value" id="val-ping">—</div>
        <div class="card-unit">ms</div>
      </div>

      <div class="card card-wide" id="card-dl">
        <div class="card-top">
          <div>
            <div class="card-label">Download</div>
            <div class="card-value" id="val-dl">—</div>
            <div class="card-unit">Mbps</div>
          </div>
          <button class="btn" id="btn-dl">Test</button>
        </div>
        <progress id="prog-dl" max="100" value="0"></progress>
        <canvas id="chart-dl" class="chart"></canvas>
      </div>

      <div class="card card-wide" id="card-ul">
        <div class="card-top">
          <div>
            <div class="card-label">Upload</div>
            <div class="card-value" id="val-ul">—</div>
            <div class="card-unit">Mbps</div>
          </div>
          <button class="btn" id="btn-ul">Test</button>
        </div>
        <progress id="prog-ul" max="100" value="0"></progress>
        <canvas id="chart-ul" class="chart"></canvas>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
