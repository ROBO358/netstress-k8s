apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: netstress-tls
spec:
  secretName: netstress-tls
  commonName: netstress.yh.k8s.tsuru.run
  dnsNames:
    - netstress.yh.k8s.tsuru.run
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  duration: 2160h
  renewBefore: 720h
